<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Hub</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1220;
      color: #f5f5f5;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: min(100%, 960px);
      padding: 2rem;
      text-align: center;
    }

    h1 {
      margin-bottom: 0.25rem;
    }

    p {
      margin-top: 0;
      margin-bottom: 2rem;
      color: #cbd5e1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.25);
    }

    .card h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .square-button {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.09);
      color: #f5f5f5;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: grid;
      place-items: center;
      text-decoration: none;
      transition: transform 0.15s ease, background 0.15s ease, border 0.15s ease;
    }

    .square-button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.55);
    }

    .square-button:active {
      transform: translateY(1px);
    }

    .note {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Game Hub</h1>
    <p>Pick a game and jump straight in.</p>

    <div class="grid">
      <div class="card">
        <h2>Flappy Bird</h2>
        <a class="square-button" href="flappy-bird-main/index.html" target="_blank" rel="noreferrer noopener">Play</a>
      </div>

      <div class="card">
        <h2>Restaurant Game</h2>
        <a class="square-button" href="restaurant-game-main/index.html" target="_blank" rel="noreferrer noopener">Play</a>
      </div>

      <div class="card">
        <h2>Snake</h2>
        <a class="square-button" href="snake-game-main/index.html" target="_blank" rel="noreferrer noopener">Play</a>
      </div>
    </div>

    <p class="note">Tip: Each game opens in a new tab. Close the tab to return here.</p>
  </div>
</body>
</html>
